<!DOCTYPE html>
<html>
<head>
  <title>Stage Management Schedule</title>
  <style>
    /* CSS styles for the grid and the horizontal bar */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(16, 1fr);
      height: 400px;
      border: 1px solid black;
      position: relative;
    }

    .time-slot {
      border-bottom: 1px solid lightgray;
      padding: 5px;
    }

    .current-time-bar {
      position: absolute;
      top: 0;
      width: 100%;
      height: 3px;
      background-color: red;
    }
  </style>
</head>
<body>
  <div class="grid">
    <!-- Generate time slots with hourly increments -->
    <div class="time-slot">6AM</div>
    <div class="time-slot">7AM</div>
    <div class="time-slot">8AM</div>
    <div class="time-slot">9AM</div>
    <div class="time-slot">10AM</div>
    <div class="time-slot">11AM</div>
    <div class="time-slot">12PM</div>
    <div class="time-slot">1PM</div>
    <div class="time-slot">2PM</div>
    <div class="time-slot">3PM</div>
    <div class="time-slot">4PM</div>
    <div class="time-slot">5PM</div>
    <div class="time-slot">6PM</div>
    <div class="time-slot">7PM</div>
    <div class="time-slot">8PM</div>
    <div class="time-slot">9PM</div>
    <div class="time-slot">10PM</div>

    <!-- Overlay the current time bar -->
    <div class="current-time-bar"></div>
  </div>

  <script>
    // JavaScript code to position the current time bar
    window.addEventListener('DOMContentLoaded', function() {
      // Calculate the current time position as a percentage
      var now = new Date();
      var hours = now.getUTCHours();
      var minutes = now.getUTCMinutes();
      var currentTimePosition = ((hours - 6) * 60 + minutes) * 100 / (16 * 60);
      console.log(currentTimePosition);
      console.log(hours);
      console.log(minutes);

      // Set the top position of the current time bar
      var currentBar = document.querySelector('.current-time-bar');
      currentBar.style.top = currentTimePosition + '%';
    });
  </script>
</body>
</html>
